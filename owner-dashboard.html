<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Dashboard</title>
<style>
  :root {
    --bg: #0E0F11;
    --panel: #16181C;
    --border: #26292E;
    --text: #E7E8EA;
    --text-dim: #bac5db;
    --accent: #caff4d;
    --warn: #FF8A8A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .subtitle { font-size: 11px; color: var(--text-dim); }
  .lock-badge {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* ── Login screen ── */
  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    text-align: center;
  }
  .login-box h2 {
    font-size: 16px;
    margin: 0 0 6px;
  }
  .login-box p {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 0 20px;
  }
  .login-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%;
    background: var(--accent);
    color: #06121F;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .login-error {
    color: var(--warn);
    font-size: 12px;
    margin-top: 10px;
    min-height: 14px;
  }

  /* ── Dashboard (chat) screen ── */
  #dashboard-screen { display: none; flex: 1; flex-direction: column; }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.user { align-self: flex-end; background: var(--accent); color: #06121F; }
  .msg.agent { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
  .msg.agent .tag {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .msg.system { align-self: center; color: var(--text-dim); font-size: 12px; font-style: italic; }
  .msg.error { align-self: flex-start; background: #2A1414; border: 1px solid #5A2424; color: var(--warn); }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent);
    color: #06121F;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #send:disabled { opacity: 0.5; cursor: default; }

  .quick-prompts {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    flex-wrap: wrap;
  }
  .quick-prompts button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 16px;
    cursor: pointer;
  }
  .quick-prompts button:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>OWNER DASHBOARD</h1>
  <span class="lock-badge" id="lock-indicator">🔒 Locked</span>
</header>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-box">
    <h2>Owner Access</h2>
    <p>Enter your owner password to view forecasting, stock, and order data.</p>
    <input id="password-input" type="password" placeholder="Owner password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Unlock Dashboard</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── DASHBOARD SCREEN (hidden until unlocked) ── -->
<div id="dashboard-screen">
  <div id="log"></div>
  <div class="quick-prompts">
    <button onclick="quickAsk('Show me a full financial summary')">Full financial summary</button>
    <button onclick="quickAsk('How is revenue trending this week vs last week?')">Revenue trends</button>
    <button onclick="quickAsk('Who are my top customers?')">Top customers</button>
    <button onclick="quickAsk('What needs reordering right now?')">What needs reordering?</button>
    <button onclick="quickAsk('How many orders are pending fulfillment?')">Pending orders</button>
  </div>
  <footer>
    <input id="input" type="text" placeholder="Ask about stock, forecasting, orders, or policies..." onkeydown="if(event.key==='Enter') send()">
    <button id="send" onclick="send()">Send</button>
  </footer>
</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";
  let ownerPassword = "";
  let conversationHistory = [];

  async function login() {
    const input = document.getElementById("password-input");
    const errorDiv = document.getElementById("login-error");
    const pwd = input.value.trim();

    if (!pwd) {
      errorDiv.textContent = "Please enter a password.";
      return;
    }

    // Verify by sending a harmless test message to /chat/owner
    try {
      const res = await fetch(`${API_BASE}/chat/owner`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-password": pwd
        },
        body: JSON.stringify({ message: "hello" })
      });

      if (res.status === 401) {
        errorDiv.textContent = "Incorrect password. Try again.";
        return;
      }
      if (!res.ok) {
        errorDiv.textContent = `Server error (${res.status}). Is the backend running?`;
        return;
      }

      // Success
      ownerPassword = pwd;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard-screen").style.display = "flex";
      document.getElementById("lock-indicator").textContent = "🔓 Unlocked";
      addSystemMsg("Owner dashboard connected — ask about stock, reorder forecasts, or orders");
      document.getElementById("input").focus();

    } catch (err) {
      errorDiv.textContent = `Could not reach server: ${err.message}`;
    }
  }

  function addMsg(text, role, tag) {
    const log = document.getElementById("log");
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    if (role === "agent" && tag) {
      const tagEl = document.createElement("span");
      tagEl.className = "tag";
      tagEl.textContent = tag;
      div.appendChild(tagEl);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }

    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function addSystemMsg(text) {
    addMsg(text, "system");
  }

  function quickAsk(text) {
    document.getElementById("input").value = text;
    send();
  }

  async function send() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingDiv = addMsg("thinking...", "agent", "routing");

    try {
      const res = await fetch(`${API_BASE}/chat/owner`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-password": ownerPassword
        },
        body: JSON.stringify({ message: text, history: conversationHistory })
      });

      if (res.status === 401) {
        typingDiv.remove();
        addMsg("Session expired or password incorrect. Refresh and log in again.", "error");
        return;
      }
      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const label = (data.agents_used && data.agents_used.length)
        ? data.agents_used.join(" + ")
        : "assistant";

      typingDiv.remove();
      addMsg(data.reply, "agent", label);

      // store exchange in history
      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: data.reply });
      if (conversationHistory.length > 10) {
        conversationHistory = conversationHistory.slice(-10);
      }

    } catch (err) {
      typingDiv.remove();
      addMsg(`Could not reach the agent server. (${err.message})`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
