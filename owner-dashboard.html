<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brisq Owner Dashboard</title>
<style>
  :root {
    --bg: #0E0F11;
    --panel: #16181C;
    --border: #26292E;
    --text: #E7E8EA;
    --text-dim: #bac5db;
    --accent: #caff4d;
    --warn: #FF8A8A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
  }

  .lock-badge {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
  }

  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    text-align: center;
  }

  input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    outline: none;
  }

  .login-box input {
    width: 100%;
    margin-bottom: 12px;
  }

  button {
    background: var(--accent);
    color: #06121F;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .login-box button {
    width: 100%;
  }

  .login-error {
    color: var(--warn);
    font-size: 12px;
    margin-top: 10px;
    min-height: 14px;
  }

  #dashboard-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  #main-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .approval-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }

  .approval-box h2 {
    margin: 0 0 12px;
    font-size: 16px;
  }

  .approval-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-top: 12px;
    background: #111317;
    white-space: pre-wrap;
    font-size: 13px;
  }

  .approval-card h3 {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 14px;
  }

  .approval-card p {
    margin: 6px 0;
    color: var(--text-dim);
  }

  .approval-card button {
    margin-right: 8px;
    margin-top: 10px;
  }

  .reject-btn {
    background: var(--warn);
    color: #1a0505;
  }

  #log {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #06121F;
  }

  .msg.agent {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
  }

  .msg.agent .tag {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .msg.system {
    align-self: center;
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  .msg.error {
    align-self: flex-start;
    background: #2A1414;
    border: 1px solid #5A2424;
    color: var(--warn);
  }

  .quick-prompts {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    flex-wrap: wrap;
  }

  .quick-prompts button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 16px;
  }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  #input {
    flex: 1;
    background: var(--panel);
  }

  #send:disabled {
    opacity: 0.5;
  }
</style>
</head>

<body>

<header>
  <h1>BRISQ OWNER DASHBOARD</h1>
  <span class="lock-badge" id="lock-indicator">🔒 Locked</span>
</header>

<div id="login-screen">
  <div class="login-box">
    <h2>Owner Access</h2>
    <p>Enter your owner password.</p>
    <input id="password-input" type="password" placeholder="Owner password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Unlock Dashboard</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="dashboard-screen">

  <div id="main-content">

    <div class="approval-box">
      <h2>Approval Center</h2>
      <button onclick="loadApprovals()">Load Pending Approvals</button>
      <div id="approvals"></div>
    </div>

    <div id="log"></div>

  </div>

  <div class="quick-prompts">
    <button onclick="quickAsk('Show me a full financial summary')">Full financial summary</button>
    <button onclick="quickAsk('How is revenue trending this week vs last week?')">Revenue trends</button>
    <button onclick="quickAsk('What needs reordering right now?')">Reorder</button>
    <button onclick="quickAsk('Create abandoned cart recovery messages')">Abandoned cart</button>
    <button onclick="quickAsk('Generate weekly P&L report')">Weekly P&L</button>
  </div>

  <footer>
    <input id="input" type="text" placeholder="Ask Brisq..." onkeydown="if(event.key==='Enter') send()">
    <button id="send" onclick="send()">Send</button>
  </footer>

</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";
  let ownerPassword = "";
  let conversationHistory = [];

  async function login() {
    const input = document.getElementById("password-input");
    const errorDiv = document.getElementById("login-error");
    const pwd = input.value.trim();

    if (!pwd) {
      errorDiv.textContent = "Please enter a password.";
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/chat/owner`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-password": pwd
        },
        body: JSON.stringify({ message: "hello", history: [] })
      });

      if (res.status === 401) {
        errorDiv.textContent = "Incorrect password.";
        return;
      }

      if (!res.ok) {
        errorDiv.textContent = `Server error ${res.status}`;
        return;
      }

      ownerPassword = pwd;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard-screen").style.display = "flex";
      document.getElementById("lock-indicator").textContent = "🔓 Unlocked";

      addSystemMsg("Brisq connected. Approval Center is ready.");
      loadApprovals();

    } catch (err) {
      errorDiv.textContent = `Could not reach server: ${err.message}`;
    }
  }

  function addMsg(text, role, tag) {
    const log = document.getElementById("log");
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    if (role === "agent" && tag) {
      const tagEl = document.createElement("span");
      tagEl.className = "tag";
      tagEl.textContent = tag;
      div.appendChild(tagEl);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }

    log.appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
    return div;
  }

  function addSystemMsg(text) {
    addMsg(text, "system");
  }

  function quickAsk(text) {
    document.getElementById("input").value = text;
    send();
  }

  async function send() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();

    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingDiv = addMsg("thinking...", "agent", "routing");

    try {
      const res = await fetch(`${API_BASE}/chat/owner`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-password": ownerPassword
        },
        body: JSON.stringify({
          message: text,
          history: conversationHistory
        })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const label = data.agents_used?.length ? data.agents_used.join(" + ") : "assistant";

      typingDiv.remove();
      addMsg(data.reply, "agent", label);

      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: data.reply });

      if (conversationHistory.length > 10) {
        conversationHistory = conversationHistory.slice(-10);
      }

      loadApprovals();

    } catch (err) {
      typingDiv.remove();
      addMsg(`Could not reach the agent server. (${err.message})`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  async function loadApprovals() {
    const approvalsDiv = document.getElementById("approvals");
    approvalsDiv.innerHTML = "<p>Loading approvals...</p>";

    try {
      const res = await fetch(`${API_BASE}/approvals`, {
        method: "GET",
        headers: {
          "x-owner-password": ownerPassword
        }
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const approvals = data.pending_approvals || [];

      if (approvals.length === 0) {
        approvalsDiv.innerHTML = "<p>No pending approvals.</p>";
        return;
      }

      approvalsDiv.innerHTML = "";

      approvals.forEach(approval => {
        let payloadText = "";

        try {
          const payload = JSON.parse(approval.payload || "{}");
          payloadText = JSON.stringify(payload, null, 2);
        } catch {
          payloadText = approval.payload || "";
        }

        const card = document.createElement("div");
        card.className = "approval-card";

        card.innerHTML = `
          <h3>${approval.approval_type.toUpperCase()} — ${approval.title}</h3>
          <p><strong>ID:</strong> ${approval.id}</p>
          <p><strong>Reference:</strong> ${approval.reference_id}</p>
          <p><strong>Status:</strong> ${approval.status}</p>
          <p><strong>Description:</strong> ${approval.description || ""}</p>
          <pre>${payloadText}</pre>
          <button onclick="approveApproval(${approval.id})">Approve</button>
          <button class="reject-btn" onclick="rejectApproval(${approval.id})">Reject</button>
        `;

        approvalsDiv.appendChild(card);
      });

    } catch (err) {
      approvalsDiv.innerHTML = `<p style="color: var(--warn);">Could not load approvals: ${err.message}</p>`;
    }
  }

  async function approveApproval(id) {
    try {
      const res = await fetch(`${API_BASE}/approvals/${id}/approve`, {
        method: "POST",
        headers: {
          "x-owner-password": ownerPassword
        }
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      addSystemMsg(`Approval ${id} approved.`);
      loadApprovals();

    } catch (err) {
      addMsg(`Approval failed: ${err.message}`, "error");
    }
  }

  async function rejectApproval(id) {
    try {
      const res = await fetch(`${API_BASE}/approvals/${id}/reject`, {
        method: "POST",
        headers: {
          "x-owner-password": ownerPassword
        }
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      addSystemMsg(`Approval ${id} rejected.`);
      loadApprovals();

    } catch (err) {
      addMsg(`Reject failed: ${err.message}`, "error");
    }
  }
</script>

</body>
</html>
