<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brisq Owner Dashboard</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  body {
    background-color: var(--ink-navy);
  }
  
  .dashboard-layout {
    display: flex;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  
  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--ink-navy);
    color: var(--text-primary-on-navy);
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  
  .sidebar-header {
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  
  .sidebar-header h1 {
    margin: 0 0 12px 0;
    color: var(--parchment);
    font-size: var(--text-20);
  }
  
  .nav-links {
    padding: 24px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .nav-btn {
    background: transparent;
    color: var(--text-muted-on-navy);
    text-align: left;
    padding: 10px 16px;
    font-size: var(--text-14);
    font-weight: 600;
    border-radius: 6px;
    transition: all 150ms;
  }
  
  .nav-btn:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary-on-navy);
  }
  
  /* Main Content Area */
  .main-content {
    flex: 1;
    background: var(--parchment);
    overflow-y: auto;
    position: relative;
  }
  
  .grid-container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 24px;
    /* 12 column grid */
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 24px;
  }
  
  /* Full width sections span all 12 columns */
  .col-12 {
    grid-column: span 12;
  }
  
  /* Login Screen overlay */
  #login-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .login-box {
    background: #FFFFFF;
    border: 1px solid var(--parchment-dim);
    border-radius: 6px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  
  .login-box h2 {
    font-size: var(--text-28);
    color: var(--text-primary-on-parchment);
    margin: 0 0 12px 0;
  }
  
  .login-box p {
    color: var(--text-muted-on-parchment);
    margin-bottom: 24px;
  }
  
  .login-box input, .login-box button {
    width: 100%;
    margin-bottom: 16px;
  }
  
  .login-error {
    color: var(--rust);
    font-size: var(--text-14);
    min-height: 20px;
  }
  
  /* Approval Feed */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  
  .section-header h2 {
    font-size: var(--text-28);
    margin: 0;
  }
  
  .approval-card {
    background: #FFFFFF;
    border: 1px solid var(--parchment-dim);
    border-radius: 6px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  
  .approval-card h3 {
    margin: 0 0 12px 0;
    font-size: var(--text-20);
  }
  
  .approval-card p {
    margin: 6px 0;
    font-size: var(--text-14);
  }
  
  .approval-card .meta {
    color: var(--text-muted-on-parchment);
    margin-bottom: 16px;
  }
  
  .approval-card pre {
    background: var(--parchment);
    padding: 16px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: var(--text-14);
    border: 1px solid var(--parchment-dim);
    color: var(--text-muted-on-parchment);
  }
  
  .card-actions {
    margin-top: 24px;
    display: flex;
    gap: 12px;
  }
  
  .btn-approve {
    background: var(--ink-navy);
    color: var(--text-primary-on-navy);
  }
  
  .btn-reject {
    background: transparent;
    color: var(--rust);
    border: 1px solid var(--rust);
  }
  .btn-reject:hover:not(:disabled) {
    background: #FDF3F2;
  }
  
  /* Status Labels */
  .status-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: var(--text-12);
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-label.pending { background: #FDF7E7; color: var(--signal-gold); }
  .status-label.approved { background: #EEF5F1; color: var(--verdigris); }
  .status-label.rejected { background: #FDF3F2; color: var(--rust); }
  
  /* Stamp Graphic */
  .stamp-container {
    position: absolute;
    top: 20px;
    right: 20px;
    pointer-events: none;
  }
  
  .approval-stamp {
    width: 72px;
    height: 72px;
  }
  .approval-stamp.approve { color: var(--verdigris); }
  .approval-stamp.reject { color: var(--rust); }

  /* Chat Log overlay */
  .chat-box {
    background: #FFFFFF;
    border: 1px solid var(--parchment-dim);
    border-radius: 6px;
    padding: 24px;
    margin-top: 32px;
    display: none; /* activated by quick asks */
  }

  .chat-box #log {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
    max-height: 400px;
    overflow-y: auto;
  }

  .chat-box .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 6px;
    border: 1px solid var(--parchment-dim);
    font-size: var(--text-14);
  }
  .chat-box .msg.user {
    align-self: flex-end;
    background: var(--parchment-dim);
    border-color: transparent;
  }
  .chat-box .msg.agent {
    align-self: flex-start;
  }
  
  .chat-input-row {
    display: flex;
    gap: 12px;
  }
  .chat-input-row input { flex: 1; }
  
</style>
</head>

<body>

<div class="dashboard-layout">
  
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1 class="display-text">Brisq Ledger</h1>
      <span class="lock-badge" id="lock-indicator">🔒 Locked</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn" onclick="loadApprovals()">Approval Feed</button>
      <button class="nav-btn" onclick="quickAsk('Show me a full financial summary')">Financial Summary</button>
      <button class="nav-btn" onclick="quickAsk('What needs reordering right now?')">Inventory Check</button>
      <button class="nav-btn" onclick="quickAsk('Generate weekly P&L report')">Weekly P&L</button>
    </div>
  </nav>

  <main class="main-content">
    
    <div id="login-screen">
      <div class="login-box">
        <h2 class="display-text">Owner Ledger</h2>
        <p>Authenticate to review pending actions.</p>
        <input id="password-input" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()">Unlock Ledger</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>

    <div id="dashboard-screen" class="grid-container" style="display: none;">
      
      <div class="col-12">
        <div class="section-header">
          <h2 class="display-text">Approval Feed</h2>
          <button onclick="loadApprovals()" style="background: transparent; color: var(--ink-navy); border: 1px solid var(--parchment-dim);">Refresh</button>
        </div>
        <div id="approvals"></div>
      </div>
      
      <div class="col-12 chat-box" id="chat-box">
        <h3 class="display-text" style="margin-top: 0;">Assistant Log</h3>
        <div id="log"></div>
        <div class="chat-input-row">
          <input id="input" type="text" placeholder="Ask Brisq..." onkeydown="if(event.key==='Enter') send()">
          <button id="send" onclick="send()">Send</button>
        </div>
      </div>

    </div>
    
  </main>

</div>

<script src="assets/config.js"></script>
<script src="assets/api.js"></script>
<script>
  let conversationHistory = [];

  function escapeHtml(unsafe) {
    if (unsafe == null) return "";
    return String(unsafe)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  const stampSvg = (type) => `
  <div class="stamp-container animate-stamp">
    <svg width="72" height="72" viewBox="0 0 100 100" class="approval-stamp ${type}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="44" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="12,3,6,2,8,2" />
      <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="8,2" />
      <text x="50" y="55" font-family="var(--font-mono)" font-size="16" font-weight="bold" fill="currentColor" text-anchor="middle" letter-spacing="1">${type.toUpperCase()}</text>
    </svg>
  </div>
  `;

  async function login() {
    const input = document.getElementById("password-input");
    const errorDiv = document.getElementById("login-error");
    const loginBtn = document.querySelector(".login-box button");
    const pwd = input.value.trim();

    if (!pwd) {
      errorDiv.textContent = "Please enter a password.";
      return;
    }
    
    loginBtn.disabled = true;

    try {
      const res = await fetchApi(`/auth/login`, {
        method: "POST",
        body: JSON.stringify({ password: pwd })
      });

      if (res.status === 401) {
        errorDiv.textContent = "Incorrect password.";
        return;
      }

      if (!res.ok) {
        errorDiv.textContent = `Server error ${res.status}`;
        return;
      }

      const data = await res.json();
      setSessionToken(data.token);
      
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard-screen").style.display = "grid";
      document.getElementById("lock-indicator").textContent = "🔓 Unlocked";
      document.getElementById("lock-indicator").style.color = "var(--parchment)";
      document.getElementById("lock-indicator").style.borderColor = "rgba(255,255,255,0.2)";

      loadApprovals();

    } catch (err) {
      errorDiv.textContent = `Could not reach server: ${err.message}`;
    } finally {
      loginBtn.disabled = false;
    }
  }

  async function loadApprovals() {
    const btn = document.querySelector(".section-header button");
    if(btn) btn.disabled = true;
    
    const approvalsDiv = document.getElementById("approvals");
    approvalsDiv.innerHTML = "<p>Loading ledger entries...</p>";

    try {
      const res = await fetchApi(`/approvals`, { method: "GET" });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const approvals = data.pending_approvals || [];

      if (approvals.length === 0) {
        approvalsDiv.innerHTML = "<p style='color: var(--text-muted-on-parchment)'>No pending approvals. The ledger is clear.</p>";
        return;
      }

      approvalsDiv.innerHTML = "";

      approvals.forEach(approval => {
        let payloadText = "";
        try {
          const payload = JSON.parse(approval.payload || "{}");
          payloadText = JSON.stringify(payload, null, 2);
        } catch {
          payloadText = approval.payload || "";
        }

        const card = document.createElement("div");
        card.className = "approval-card animate-slide-up";
        card.id = `approval-card-${approval.id}`;

        const statusLabel = approval.status === 'pending' ? 'pending' : (approval.status === 'approved' ? 'approved' : 'rejected');

        card.innerHTML = `
          <h3 class="display-text">${escapeHtml(approval.title)}</h3>
          <div class="meta mono-text">
            <span>REF: ${escapeHtml(approval.reference_id)}</span> | 
            <span>TYPE: ${escapeHtml(approval.approval_type.toUpperCase())}</span> | 
            <span class="status-label ${statusLabel}">● ${escapeHtml(approval.status)}</span>
          </div>
          <p>${escapeHtml(approval.description || "")}</p>
          <pre class="mono-text">${escapeHtml(payloadText)}</pre>
          <div class="card-actions">
            <button class="btn-approve" onclick="approveApproval(${escapeHtml(approval.id)}, this)">Approve</button>
            <button class="btn-reject" onclick="rejectApproval(${escapeHtml(approval.id)}, this)">Reject</button>
          </div>
        `;
        approvalsDiv.appendChild(card);
      });

    } catch (err) {
      approvalsDiv.innerHTML = `<p style="color: var(--rust);">Could not load approvals: ${err.message}</p>`;
    } finally {
      if(btn) btn.disabled = false;
    }
  }

  async function approveApproval(id, btnElement) {
    if(btnElement) btnElement.disabled = true;
    const card = document.getElementById(`approval-card-${id}`);
    
    try {
      const res = await fetchApi(`/approvals/${id}/approve`, { method: "POST" });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      // Inject stamp
      if (card) {
        card.insertAdjacentHTML('beforeend', stampSvg('approve'));
        card.querySelector('.status-label').className = 'status-label approved';
        card.querySelector('.status-label').innerHTML = '● APPROVED';
        // Disable actions
        card.querySelectorAll('.card-actions button').forEach(b => b.disabled = true);
        
        // Remove card after 2s
        setTimeout(() => loadApprovals(), 2000);
      } else {
        loadApprovals();
      }
    } catch (err) {
      alert(`Approval failed: ${err.message}`);
    } finally {
      if(btnElement && !card) btnElement.disabled = false;
    }
  }

  async function rejectApproval(id, btnElement) {
    if(btnElement) btnElement.disabled = true;
    const card = document.getElementById(`approval-card-${id}`);

    try {
      const res = await fetchApi(`/approvals/${id}/reject`, { method: "POST" });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      // Inject stamp
      if (card) {
        card.insertAdjacentHTML('beforeend', stampSvg('reject'));
        card.querySelector('.status-label').className = 'status-label rejected';
        card.querySelector('.status-label').innerHTML = '● REJECTED';
        // Disable actions
        card.querySelectorAll('.card-actions button').forEach(b => b.disabled = true);
        
        // Remove card after 2s
        setTimeout(() => loadApprovals(), 2000);
      } else {
        loadApprovals();
      }
    } catch (err) {
      alert(`Reject failed: ${err.message}`);
    } finally {
      if(btnElement && !card) btnElement.disabled = false;
    }
  }

  function addMsg(text, role) {
    const log = document.getElementById("log");
    const div = document.createElement("div");
    div.className = `msg ${role} animate-slide-up`;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function quickAsk(text) {
    document.getElementById("chat-box").style.display = "block";
    document.getElementById("input").value = text;
    send();
  }

  async function send() {
    document.getElementById("chat-box").style.display = "block";
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();

    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingDiv = addMsg("Thinking...", "agent");

    try {
      const res = await fetchApi(`/chat/owner`, {
        method: "POST",
        body: JSON.stringify({ message: text, history: conversationHistory })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      
      typingDiv.remove();
      addMsg(data.reply, "agent");

      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: data.reply });
      if (conversationHistory.length > 10) {
        conversationHistory = conversationHistory.slice(-10);
      }

    } catch (err) {
      typingDiv.remove();
      addMsg(`Error: ${err.message}`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
