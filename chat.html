<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce Agent Console</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
    }
    .msg.agent.support .tag { color: var(--support); }
    .msg.agent.inventory .tag { color: var(--inventory); }
    .msg.agent.policy .tag { color: var(--policy); }
    .msg.agent.multi .tag { color: var(--accent); }
    .msg.agent.none .tag { color: var(--text-dim); }
    
    .typing { display: inline-flex; gap: 3px; align-items: center; }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-dim);
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <h1>E-COMMERCE AGENT CONSOLE</h1>
  <div class="subtitle">Auto-routed by orchestrator — just ask</div>
</header>

<div id="log"></div>

<footer>
  <input id="input" type="text" placeholder="Ask about an order, refund, stock, or policy..." onkeydown="if(event.key==='Enter') send()">
  <button id="send" onclick="send()">Send</button>
</footer>

<script src="assets/config.js"></script>
<script src="assets/api.js"></script>
<script>
  let conversationHistory = [];  // stores {role, content} pairs

  function addMsg(text, role, agentType) {
    const log = document.getElementById("log");
    const div = document.createElement("div");
    div.className = `msg ${role}` + (agentType ? ` ${agentType}` : "");

    if (role === "agent") {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = agentType;
      div.appendChild(tag);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }

    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function addSystemMsg(text) {
    addMsg(text, "system");
  }

  // Turns ["support", "policy"] into a display label like "support + policy"
  // and into a CSS-safe class. Falls back to "none" if nothing was routed.
  function agentLabel(agentsUsed) {
    if (!agentsUsed || agentsUsed.length === 0) return "none";
    if (agentsUsed.length === 1) return agentsUsed[0];
    return "multi";
  }

  function agentDisplayText(agentsUsed) {
    if (!agentsUsed || agentsUsed.length === 0) return "assistant";
    return agentsUsed.join(" + ");
  }

  async function send() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingDiv = addMsg("", "agent", "multi");
    typingDiv.innerHTML = `<span class="tag">routing...</span><span class="typing"><span></span><span></span><span></span></span>`;

    try {
      const res = await fetchApi(`/chat/customer`, {
        method: "POST",
        body: JSON.stringify({ message: text, history: conversationHistory })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const cssClass = agentLabel(data.agents_used);
      const label = agentDisplayText(data.agents_used);

      typingDiv.className = `msg agent ${cssClass}`;
      typingDiv.innerHTML = "";

      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = label;
      typingDiv.appendChild(tag);
      typingDiv.appendChild(document.createTextNode(data.reply));

      // store this exchange in history
      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: data.reply });
      // keep only last 10 messages (5 exchanges) to avoid token bloat
      if (conversationHistory.length > 10) {
        conversationHistory = conversationHistory.slice(-10);
      }

    } catch (err) {
      typingDiv.remove();
      addMsg(`Could not reach the agent server. Is it running? (${err.message})`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  addSystemMsg("Connected to E-commerce Agent API — ask anything about orders, refunds, stock, or policies and it'll route automatically");
</script>

</body>
</html>
