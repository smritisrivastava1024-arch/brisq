<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brisq Chat</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  body {
    justify-content: center;
  }
  .chat-container {
    width: 100%;
    max-width: 720px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--parchment);
  }
  header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--parchment-dim);
  }
  header h1 {
    font-size: var(--text-20);
    margin: 0;
    color: var(--text-primary-on-parchment);
  }
  .subtitle {
    font-size: var(--text-12);
    color: var(--text-muted-on-parchment);
    margin-top: 4px;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 6px;
    font-size: var(--text-16);
    line-height: 1.5;
    white-space: pre-wrap;
    border: 1px solid var(--parchment-dim);
  }
  .msg.user {
    align-self: flex-end;
    background: var(--parchment-dim);
    color: var(--text-primary-on-parchment);
    border-color: transparent;
  }
  .msg.agent {
    align-self: flex-start;
    background: #FFFFFF; /* bright card */
  }
  .msg.agent .tag {
    display: block;
    font-size: var(--text-12);
    text-transform: uppercase;
    color: var(--text-muted-on-parchment);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .msg.system {
    align-self: center;
    color: var(--text-muted-on-parchment);
    font-size: var(--text-14);
    font-style: italic;
    border: none;
    padding: 0;
  }
  .msg.error {
    align-self: flex-start;
    background: #FDF3F2;
    border-color: var(--rust);
    color: var(--rust);
  }
  footer {
    padding: 20px;
    border-top: 1px solid var(--parchment-dim);
    display: flex;
    gap: 12px;
  }
  #input {
    flex: 1;
    background: #FFFFFF;
  }
  .typing { display: inline-flex; gap: 4px; align-items: center; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted-on-parchment);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
</style>
</head>
<body>

<div class="chat-container">
  <header>
    <h1 class="display-text">Customer Support</h1>
    <div class="subtitle">Ask about orders, refunds, stock, or policies</div>
  </header>

  <div id="log"></div>

  <footer>
    <input id="input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
    <button id="send" onclick="send()">Send</button>
  </footer>
</div>

<script src="assets/config.js"></script>
<script src="assets/api.js"></script>
<script>
  let conversationHistory = [];

  function addMsg(text, role, agentType) {
    const log = document.getElementById("log");
    const div = document.createElement("div");
    // Add animate-slide-up class based on requirements
    div.className = `msg ${role} animate-slide-up`;

    if (role === "agent") {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = agentType || "assistant";
      div.appendChild(tag);
      div.appendChild(document.createTextNode(text));
    } else {
      div.textContent = text;
    }

    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function addSystemMsg(text) {
    addMsg(text, "system");
  }

  function agentDisplayText(agentsUsed) {
    if (!agentsUsed || agentsUsed.length === 0) return "assistant";
    return agentsUsed.join(" + ");
  }

  async function send() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingDiv = addMsg("", "agent", "routing...");
    typingDiv.innerHTML = `<span class="tag">routing...</span><span class="typing"><span></span><span></span><span></span></span>`;

    try {
      const res = await fetchApi(`/chat/customer`, {
        method: "POST",
        body: JSON.stringify({ message: text, history: conversationHistory })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      const label = agentDisplayText(data.agents_used);

      typingDiv.className = `msg agent animate-slide-up`;
      typingDiv.innerHTML = "";

      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = label;
      typingDiv.appendChild(tag);
      typingDiv.appendChild(document.createTextNode(data.reply));
      
      const log = document.getElementById("log");
      log.scrollTop = log.scrollHeight;

      conversationHistory.push({ role: "user", content: text });
      conversationHistory.push({ role: "assistant", content: data.reply });
      if (conversationHistory.length > 10) {
        conversationHistory = conversationHistory.slice(-10);
      }

    } catch (err) {
      typingDiv.remove();
      addMsg(`Could not reach the agent server. Is it running? (${err.message})`, "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  addSystemMsg("Connected to E-commerce Agent API — ask anything about orders, refunds, stock, or policies.");
</script>

</body>
</html>
