<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce Agent Console</title>
<style>
  :root {
    --bg: #0E0F11;
    --panel: #16181C;
    --border: #26292E;
    --text: #E7E8EA;
    --text-dim: #bac5db;
    --accent: #caff4d;
    --support: #f3ff4d;
    --inventory: #c4b01a;
    --policy: #ebff7d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .agent-toggle {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .agent-toggle button {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .agent-toggle button.active.support { background: var(--support); color: #06121F; }
  .agent-toggle button.active.inventory { background: var(--inventory); color: #06201B; }
  .agent-toggle button.active.policy { background: var(--policy); color: #1F0633; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #06121F;
  }
  .msg.agent {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .msg.agent .tag {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .msg.agent.support .tag { color: var(--support); }
  .msg.agent.inventory .tag { color: var(--inventory); }
  .msg.agent.policy .tag { color: var(--policy); }
  .msg.system {
    align-self: center;
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }
  .msg.error {
    align-self: flex-start;
    background: #2A1414;
    border: 1px solid #5A2424;
    color: #FF8A8A;
  }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent);
    color: #06121F;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #send:disabled { opacity: 0.5; cursor: default; }
  .typing { display: inline-flex; gap: 3px; align-items: center; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
</style>
</head>
<body>

<header>
  <h1>E-COMMERCE AGENT CONSOLE</h1>
  <div class="agent-toggle">
    <button id="btn-support" class="active support" onclick="setAgent('support')">Support</button>
    <button id="btn-inventory" class="inventory" onclick="setAgent('inventory')">Inventory</button>
    <button id="btn-policy" class="policy" onclick="setAgent('policy')">Policy</button>
  </div>
</header>

<div id="log"></div>

<footer>
  <input id="input" type="text" placeholder="Ask about an order, refund, or stock..." onkeydown="if(event.key==='Enter') send()">
  <button id="send" onclick="send()">Send</button>
</footer>

<script>
const API_BASE = "http://127.0.0.1:8000";
let currentAgent = "support";

function setAgent(agent) {
  currentAgent = agent;
  document.getElementById("btn-support").classList.toggle("active", agent === "support");
  document.getElementById("btn-inventory").classList.toggle("active", agent === "inventory");
  document.getElementById("btn-policy").classList.toggle("active", agent === "policy");
  addSystemMsg(`Switched to ${agent} agent`);
}

function addMsg(text, role, agentType) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.className = `msg ${role}` + (agentType ? ` ${agentType}` : "");
  if (role === "agent") {
    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = agentType;
    div.appendChild(tag);
    div.appendChild(document.createTextNode(text));
  } else {
    div.textContent = text;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function addSystemMsg(text) {
  addMsg(text, "system");
}

async function send() {
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";
  sendBtn.disabled = true;

  const typingDiv = addMsg("", "agent", currentAgent);
  typingDiv.innerHTML = `<span class="tag">${currentAgent}</span><span class="typing"><span></span><span></span><span></span></span>`;

  try {
    const res = await fetch(`${API_BASE}/${currentAgent}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error(`Server returned ${res.status}`);

    const data = await res.json();
    typingDiv.innerHTML = "";
    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = data.agent;
    typingDiv.appendChild(tag);
    typingDiv.appendChild(document.createTextNode(data.response));

  } catch (err) {
    typingDiv.remove();
    addMsg(`Could not reach the agent server. Is it running? (${err.message})`, "error");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

addSystemMsg("Connected to E-commerce Agent API \u2014 ask the support, inventory, or policy agent a question");
</script>

</body>
</html>
